name: Daily Trigger

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger run-daily endpoint
        env:
          API_BASE: ${{ secrets.RENDER_API_BASE }}
          TASK_TOKEN: ${{ secrets.RENDER_TASK_TOKEN }}
        run: |
          test -n "$API_BASE"
          test -n "$TASK_TOKEN"
          for i in 1 2 3 4 5; do
            response=$(curl -sS -X POST "$API_BASE/tasks/run-daily?sync=1&articles=5" \
              -H "X-Task-Token: $TASK_TOKEN" \
              -H "Content-Type: application/json")
            echo "$response"
            RESPONSE="$response" python3 - <<'PY'
import json, os, sys
resp = os.environ.get("RESPONSE", "")
try:
    data = json.loads(resp)
except Exception:
    sys.exit(1)
if not data.get("ok"):
    sys.exit(1)
if data.get("articles_succeeded", 0) <= 0:
    sys.exit(2)
sys.exit(0)
PY
            code=$?
            if [ "$code" -eq 0 ]; then
              exit 0
            fi
            sleep 30
          done
          exit 1
      - name: Export static data
        env:
          API_BASE: ${{ secrets.RENDER_API_BASE }}
        run: |
          python3 scripts/export_static_data.py
      - name: Commit static data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/*.json
          if git diff --staged --quiet; then
            echo "No static data changes"
          else
            git commit -m "chore: update static data"
            git push origin main
          fi
