name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend deps
        run: pip install -r robot-portal/backend/requirements.txt
      - name: Compile backend and ai_system
        run: |
          python -m compileall robot-portal/backend robot-portal/ai_system
      - name: Import smoke test
        run: |
          python - << 'PY'
          import sys
          sys.path.append('robot-portal')
          import backend.app
          print('backend import ok')
          PY

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend deps
        working-directory: robot-portal/frontend
        run: npm install
      - name: Build frontend
        working-directory: robot-portal/frontend
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000
        run: npm run build
