services:
  - type: web
    name: robot-portal-api
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r robot-portal/backend/requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT --app-dir robot-portal
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_API_BASE
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: TASK_TOKEN
        sync: false

jobs:
  - type: cron
    name: robot-portal-daily
    env: python
    plan: free
    schedule: "0 3 * * *"
    buildCommand: pip install -r robot-portal/backend/requirements.txt
    startCommand: python robot-portal/run.py
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_API_BASE
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: TASK_TOKEN
        sync: false
