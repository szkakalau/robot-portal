services:
  - type: web
    name: robot-portal-api
    runtime: python
    plan: free
    autoDeployTrigger: commit
    buildCommand: pip install -r robot-portal/backend/requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT --app-dir robot-portal
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_API_BASE
        sync: false
      - key: DEEPSEEK_MODEL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: TASK_TOKEN
        sync: false
